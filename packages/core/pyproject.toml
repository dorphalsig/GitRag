[project]
name = "gitrag-core"
version = "0.1.0"
description = "Core indexing, persistence, and retrieval logic for GitRag"
requires-python= ">=3.13"
readme = "README.md"
dependencies = [
    "numpy>=2.4.3",
    "pgvector>=0.4.2",
    "sentence-transformers[onnx]>=5.3.0",
    "sqlalchemy>=2.0.48",
    "sqlalchemy-libsql>=0.2.0",
    "tree-sitter>=0.25.2",
    "tree-sitter-language-pack>=1.1.4",
    "magika>=1.0.2",
    "pathspec>=1.0.4"
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "--cov=src --cov-report=term-missing"
