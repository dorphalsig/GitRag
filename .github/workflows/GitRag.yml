name: GitRag Reusable Indexer

on:
  workflow_call:
    inputs:
      db_provider:
        required: false
        type: string
        default: "libsql"
      full_index:
        required: false
        type: boolean
        default: false
      retry_count:
        required: false
        type: number
        default: 0
    secrets:
      DATABASE_URL:
        required: true
      DB_AUTH_TOKEN:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gitrag-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git diff

      - name: Run GitRag Indexer
        id: run_indexer
        continue-on-error: true
        uses: dorphalsig/gitrag@master
        with:
          repo: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          db_provider: ${{ inputs.db_provider }}
          database_url: ${{ secrets.DATABASE_URL }}
          db_auth_token: ${{ secrets.DB_AUTH_TOKEN }}
          full_index: ${{ inputs.full_index }}

      - name: Retry on soft timeout
        if: steps.run_indexer.outcome == 'failure' && inputs.retry_count < 3
        run: |
          NEXT_COUNT=$(( ${{ inputs.retry_count }} + 1 ))
          echo "Retrying workflow. Attempt $NEXT_COUNT"
          gh workflow run "${{ github.workflow }}" --ref "${{ github.ref }}" -f full_index=true -f retry_count=$NEXT_COUNT -f db_provider="${{ inputs.db_provider }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if indexer failed (non-timeout or max retries)
        if: steps.run_indexer.outcome == 'failure' && inputs.retry_count >= 3
        run: exit 1
