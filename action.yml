name: "GitRag Indexer"
description: "Run the GitRag indexing CLI for libSQL or PostgreSQL"
inputs:
  repo:
    description: "Repository identifier (namespace/name)"
    required: true
  db_provider:
    description: "Database provider ('libsql' or 'postgres')"
    required: false
    default: "libsql"
  database_url:
    description: "Connection URL (Include username for Postgres: postgresql://user@host/db)"
    required: true
  db_auth_token:
    description: "Password or Auth Token"
    required: true
  full_index:
    description: "Set to true to index all tracked files"
    required: false
    default: "false"
  branch:
    description: "Branch name"
    required: false
  soft_timeout:
    description: "Soft timeout in seconds. Indexer exits with code 75 when exceeded, enabling workflow retry."
    required: false
    default: "0"
outputs:
  exit_code:
    description: "The numeric exit code of the indexer script"
    value: ${{ steps.run-indexer.outputs.exit_code }}
  stdout:
    description: "The console output (stdout/stderr) of the indexer script"
    value: ${{ steps.run-indexer.outputs.stdout }}
runs:
  using: "composite"
  steps:
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: uv sync
      
    - name: Index Repo
      shell: bash
      env:
        DB_PROVIDER: ${{ inputs.db_provider }}
        DATABASE_URL: ${{ inputs.database_url }}
        DB_AUTH_TOKEN: ${{ inputs.db_auth_token }}
        PYTHONPATH: ${{ github.action_path }}/packages/core/src
        SOFT_TIMEOUT: ${{ inputs.soft_timeout }}
      run: |
        set +e
        ARGS=""
        [ "${{ inputs.full_index }}" = "true" ] && ARGS="--full"
        [ -n "${{ inputs.branch }}" ] && ARGS="$ARGS --branch ${{ inputs.branch }}"
        
        # If not a full scan, pass the commit range
        if [ "${{ inputs.full_index }}" != "true" ]; then
          BEFORE="${{ github.event.before }}"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            ARGS="$ARGS --from-sha $BEFORE --to-sha ${{ github.sha }}"
          fi
        fi
        OUTPUT_FILE=$(mktemp)
        ${{ github.action_path }}/.venv/bin/python ${{ github.action_path }}/packages/core/src/Indexer.py "${{ inputs.repo }}" $ARGS 2>&1 | tee "$OUTPUT_FILE"
        EXIT_CODE=${PIPESTATUS[0]}
        OUTPUT=$(cat "$OUTPUT_FILE")
        rm "$OUTPUT_FILE"
        
        # Write to GITHUB_OUTPUT using a safe multiline delimiter
        DELIMITER=$(openssl rand -hex 8)
        
        echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
        echo "stdout<<$DELIMITER" >> "$GITHUB_OUTPUT"
        echo "$OUTPUT" >> "$GITHUB_OUTPUT"
        echo "$DELIMITER" >> "$GITHUB_OUTPUT"
        
        set -e
        # Explicitly fail the composite step if the Python script failed
        exit $EXIT_CODE        
